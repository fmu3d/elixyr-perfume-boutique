    <!-- Real-time Browser Error Capture Diagnostic -->
    <script>
      window.addEventListener('error', function(e) {
        setTimeout(function() {
          var errDiv = document.createElement('div');
          errDiv.style.position = 'fixed';
          errDiv.style.top = '0';
          errDiv.style.left = '0';
          errDiv.style.width = '100%';
          errDiv.style.backgroundColor = '#ff4d4d';
          errDiv.style.color = '#fff';
          errDiv.style.padding = '24px';
          errDiv.style.zIndex = '999999';
          errDiv.style.fontFamily = 'monospace';
          errDiv.style.fontSize = '14px';
          errDiv.style.lineHeight = '1.6';
          errDiv.style.whiteSpace = 'pre-wrap';
          errDiv.style.boxShadow = '0 6px 20px rgba(0,0,0,0.4)';
          errDiv.innerHTML = '<h3 style="margin: 0 0 10px 0;">🚨 ELIXYR ATELIER RUNTIME ERROR:</h3>' + 
            '<strong>Error Message:</strong> ' + e.message + '<br>' +
            '<strong>Source File:</strong> ' + e.filename + '<br>' +
            '<strong>Line/Col:</strong> ' + e.lineno + ':' + e.colno + '<br><br>' +
            '<strong>Trace Stack:</strong><br>' + (e.error ? e.error.stack : 'No stack trace available');
          document.body.appendChild(errDiv);
        }, 100);
      });
      window.addEventListener('unhandledrejection', function(e) {
        setTimeout(function() {
          var errDiv = document.createElement('div');
          errDiv.style.position = 'fixed';
          errDiv.style.top = '0';
          errDiv.style.left = '0';
          errDiv.style.width = '100%';
          errDiv.style.backgroundColor = '#ff944d';
          errDiv.style.color = '#fff';
          errDiv.style.padding = '24px';
          errDiv.style.zIndex = '999999';
          errDiv.style.fontFamily = 'monospace';
          errDiv.style.fontSize = '14px';
          errDiv.style.lineHeight = '1.6';
          errDiv.style.whiteSpace = 'pre-wrap';
          errDiv.style.boxShadow = '0 6px 20px rgba(0,0,0,0.4)';
          errDiv.innerHTML = '<h3 style="margin: 0 0 10px 0;">⚠️ UNHANDLED REJECTION IN PROMISE:</h3>' + 
            '<strong>Reason:</strong> ' + e.reason + '<br><br>' +
            '<strong>Trace Stack:</strong><br>' + (e.reason && e.reason.stack ? e.reason.stack : 'No stack trace available');
          document.body.appendChild(errDiv);
        }, 100);
      });
    </script>
